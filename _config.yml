# ----------------------------------------------------------
# Site settings
# ----------------------------------------------------------
title:       "Jongmin Sung"
author:      "Jongmin Sung"
description: "Bio × AI researcher and writer — computational biology, deep learning, biotechnology."

# (Optional: remove/comment out any you don’t want)
email:             "jongmin.sung@gmail.com"
twitter_username:  "JongminSung2"
github_username:   "jmsung"
linkedin_username: "jongmin-sung"

# ----------------------------------------------------------
# Build settings (Minima defaults)
# ----------------------------------------------------------
markdown: kramdown
highlighter: rouge
rouge:
  theme: monokai
theme: minima
rss: rss

# Turn off kramdown’s internal highlighter (we let Rouge do it)
kramdown:
  syntax_highlighter_opts:
    disable: true

# ----------------------------------------------------------
# Plugins (GitHub Pages–approved)
# ----------------------------------------------------------
plugins:
  - jekyll-feed
  - jekyll-sitemap

# ----------------------------------------------------------
# Auto-generate post titles from first heading (optional)
# ----------------------------------------------------------
titles_from_headings:
  strip_title: true
  collections: true

# ----------------------------------------------------------
# Defaults: add “Other” tag to new posts automatically
# ----------------------------------------------------------
defaults:
  - scope:
      path: ""
      type: post
    values:
      tags: Other

# ----------------------------------------------------------
# Navigation (Minima will pick this up and render a <ul>)
# ----------------------------------------------------------
nav:
  - title: "About"
    url: "/about/"
  - title: "Project"
    url: "/project/"

# ----------------------------------------------------------
# Header pages (override Minima’s auto-discovery)
# The external "Bio × AI Weekly" → LatentCell link is added in the
# _includes/header.html override (Minima can’t link out via header_pages).
# ----------------------------------------------------------
header_pages:
  - about.md
  - project.md

# ----------------------------------------------------------
# (No include: override.css anymore)
# ----------------------------------------------------------

# Harness layer (ADR 0004) — not part of the published site
exclude:
  - docs/
  - knowledge/
  - CLAUDE.md
  - README.md
  - .claude/
  - _resume/README.md
  - Gemfile
  - Gemfile.lock
